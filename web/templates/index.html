<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AJ-entics Tools</title>

<style>
body{
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

.upload-box{
    width:420px;
    margin:auto;
    margin-top:40px;
    padding:40px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
}

input,select{
    width:100%;
    padding:12px;
    margin-top:20px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    margin-top:25px;
    padding:12px 25px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,#0078ff,#005fcc);
    color:white;
}

#downloadBtn{
    background:linear-gradient(135deg,#00c853,#009624);
}

.hidden{
    display:none;
}

#progress-container{
    display:none;
    margin-top:25px;
    text-align:left;
}

#progress-bar-bg{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
}

#progress-bar{
    width:0%;
    height:100%;
    background:#4caf50;
    border-radius:10px;
    transition:width 0.3s;
}

#result{
    margin-top:40px;
    width:80%;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    padding:25px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>AJ-entic – Analyse plugin WordPress</h1>

<div class="upload-box">

<form id="uploadForm">

<label>Provider</label>
<select name="provider" id="provider">
<option value="openai">OpenAI</option>
<option value="anthropic">Claude</option>
<option value="google">Google</option>
<option value="mistral">Mistral</option>
<option value="local">Local (LM Studio / Oobabooga / Kobold)</option>
</select>

<label>Model</label>
<input type="text" name="model" placeholder="ex: gpt-4o, claude-3-sonnet">

<div id="api_key_box">
<label>API Key</label>
<input type="text" name="api_key" placeholder="API key">
</div>

<div id="endpoint_box" class="hidden">
<label>Endpoint</label>
<input type="text" name="endpoint" placeholder="http://127.0.0.1:5000/v1/chat/completions">
</div>

<label>Plugin WordPress (zip ou dossier)</label>
<input type="file" name="file" required>

<button type="submit">Analyser</button>

</form>

<div id="progress-container">
    <div id="progress-text">Analyse en cours...</div>
    <div id="progress-bar-bg">
        <div id="progress-bar"></div>
    </div>
</div>

<button id="downloadBtn" class="hidden">Télécharger l’analyse</button>

</div>

<pre id="result"></pre>

<script>
console.log("UI loaded")

const provider = document.getElementById("provider")
const apiBox = document.getElementById("api_key_box")
const endpointBox = document.getElementById("endpoint_box")

function updateUI(){
    if(provider.value === "local"){
        apiBox.classList.add("hidden")
        endpointBox.classList.remove("hidden")
    } else {
        apiBox.classList.remove("hidden")
        endpointBox.classList.add("hidden")
    }
}
provider.addEventListener("change", updateUI)
updateUI()

const progressContainer = document.getElementById("progress-container")
const progressBar = document.getElementById("progress-bar")
const progressText = document.getElementById("progress-text")
const resultBox = document.getElementById("result")
const downloadBtn = document.getElementById("downloadBtn")

document.getElementById("uploadForm").onsubmit = async function(e){
    e.preventDefault()

    let formData = new FormData(this)

    progressContainer.style.display = "block"
    progressBar.style.width = "0%"
    progressText.innerText = "Préparation..."
    resultBox.textContent = ""
    downloadBtn.classList.add("hidden")

    // 1) Lancer l'analyse
    const resp = await fetch("/upload", {
        method: "POST",
        body: formData
    })
    const data = await resp.json()

    if(data.status !== "started"){
        resultBox.textContent = "Erreur: " + JSON.stringify(data, null, 2)
        return
    }

    // 2) Ouvrir le SSE
    const evt = new EventSource("/progress")

    evt.onmessage = (e) => {
        const p = JSON.parse(e.data)

        const total = p.total || 1
        const percent = Math.floor((p.current / total) * 100)

        progressBar.style.width = percent + "%"
        progressText.innerText = `Analyse : ${p.current} / ${p.total} fichiers (${percent}%)`

        // Analyse terminée
        if (p.current >= p.total && p.total > 0 && p.zip_path){
            evt.close()
            progressText.innerText = "Analyse terminée."

            // Afficher bouton téléchargement
            downloadBtn.classList.remove("hidden")
            downloadBtn.onclick = () => {
                window.location.href = "/download?zip_path=" + encodeURIComponent(p.zip_path)
            }

            // Charger le JSON
            fetch("/output/result.json")
                .then(r => r.json())
                .then(j => {
                    resultBox.textContent = JSON.stringify(j, null, 2)
                })
        }
    }

    evt.onerror = (e) => {
        console.error("SSE error:", e)
    }
}
</script>

</body>
</html>
