<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agent Dev</title>

<style>

body{
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color:white;
    text-align:center;
    padding-top:0px;
    margin:0;
}

.svg{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:10px;
}

.svg svg{
    width:100px;
    height:100px;
}

h1{
    font-size:36px;
    font-weight:600;
    letter-spacing:1px;
    margin-bottom:40px;
    color:#eaeaea;
}

.upload-box{
    width:420px;
    margin:auto;
    padding:40px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

input,select{
    width:100%;
    padding:12px;
    margin-top:20px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
}

option{
    color: black;
}

button{
    margin-top:25px;
    padding:12px 25px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,#0078ff,#005fcc);
    color:white;
}

#result{
    margin-top:40px;
    width:80%;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    padding:25px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    white-space:pre-wrap;
    font-size:15px;
}

.hidden{
    display:none;
}
label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    text-align:left;
    font-size:14px;
    color:#dcdcdc;
}

/* Progress bar */
#progress-container{
    display:none;
    margin-top:25px;
    text-align:left;
}

#progress-text{
    margin-bottom:8px;
    font-size:14px;
    font-weight:bold;
}

#progress-bar-bg{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
}

#progress-bar{
    width:0%;
    height:100%;
    background:#4caf50;
    border-radius:10px;
    transition:width 0.3s;
}

</style>
</head>

<body>

<h1>AJ-entic – Analyse plugin Wordpress</h1>

<div class="upload-box">

<form id="uploadForm">

<label>Provider</label>
<select name="provider" id="provider">
<option value="openai">OpenAI</option>
<option value="anthropic">Claude</option>
<option value="google">Google</option>
<option value="mistral">Mistral</option>
<option value="local">Local (LM Studio / Oobabooga / Kobold)</option>
</select>

<label>Model</label>
<input type="text" name="model" placeholder="ex: gpt-4o, gemma-4-26b-a4b-it, claude-3-sonnet">

<div id="api_key_box">
<label>API Key</label>
<input type="text" name="api_key" placeholder="API key">
</div>

<div id="endpoint_box" class="hidden">
<label>Endpoint</label>
<input type="text" name="endpoint" placeholder="http://127.0.0.1:5000/v1/chat/completions">
</div>

<label>Plugin WordPress (zip) ou dossier</label>
<input type="file" name="file" required>

<button type="submit">Analyser</button>

</form>

<!-- PROGRESS BAR -->
<div id="progress-container">
    <div id="progress-text">Analyse en cours...</div>
    <div id="progress-bar-bg">
        <div id="progress-bar"></div>
    </div>
</div>

</div>

<pre id="result"></pre>

<script>

const provider = document.getElementById("provider")
const apiBox = document.getElementById("api_key_box")
const endpointBox = document.getElementById("endpoint_box")

function updateUI(){
    if(provider.value === "local"){
        apiBox.classList.add("hidden")
        endpointBox.classList.remove("hidden")
    }else{
        apiBox.classList.remove("hidden")
        endpointBox.classList.add("hidden")
    }
}

provider.addEventListener("change",updateUI)
updateUI()

// PROGRESS BAR ELEMENTS
const progressContainer = document.getElementById("progress-container")
const progressBar = document.getElementById("progress-bar")
const progressText = document.getElementById("progress-text")

document.getElementById("uploadForm").onsubmit = async function(e){

    e.preventDefault()

    let formData = new FormData(this)

    // Reset progress bar
    progressContainer.style.display = "block"
    progressBar.style.width = "0%"
    progressText.innerText = "Préparation..."

    // Fake progress animation
    let progress = 0
    let interval = setInterval(() => {
        if(progress < 90){
            progress += 1
            progressBar.style.width = progress + "%"
            progressText.innerText = "Analyse en cours... " + progress + "%"
        }
    }, 300)

    let response = await fetch("/upload",{
        method:"POST",
        body:formData
    })

    let data = await response.json()

    clearInterval(interval)
    progressBar.style.width = "100%"
    progressText.innerText = "Analyse terminée !"

    document.getElementById("result").textContent =
        JSON.stringify(data,null,2)
}


// Charger les valeurs sauvegardées
window.addEventListener("load", () => {
    if(localStorage.provider) provider.value = localStorage.provider
    if(localStorage.model) document.querySelector("input[name='model']").value = localStorage.model
    if(localStorage.api_key) document.querySelector("input[name='api_key']").value = localStorage.api_key
    if(localStorage.endpoint) document.querySelector("input[name='endpoint']").value = localStorage.endpoint

    updateUI()
})

// Sauvegarder automatiquement à chaque changement
provider.addEventListener("change", () => {
    localStorage.provider = provider.value
})

document.querySelector("input[name='model']").addEventListener("input", e => {
    localStorage.model = e.target.value
})

document.querySelector("input[name='api_key']").addEventListener("input", e => {
    localStorage.api_key = e.target.value
})

document.querySelector("input[name='endpoint']").addEventListener("input", e => {
    localStorage.endpoint = e.target.value
})

</script>

</body>
</html>
