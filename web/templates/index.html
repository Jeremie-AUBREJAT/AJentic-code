<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AJ-entics Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<style>
body{
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}
option {
    color: black;
}
.upload-box{
    width:420px;
    margin:auto;
    margin-top:40px;
    padding:40px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
}
label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    text-align:left;
    font-size:14px;
    color:#dcdcdc;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:20px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    margin-top:25px;
    padding:12px 25px;
    font-size:17px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,#0078ff,#005fcc);
    color:white;
}

#downloadBtn{
    background:linear-gradient(135deg,#00c853,#009624);
}

.hidden{
    display:none;
}

#progress-container{
    display:none;
    margin-top:25px;
    text-align:left;
}

#progress-bar-bg{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
}

#progress-bar{
    width:0%;
    height:100%;
    background:#4caf50;
    border-radius:10px;
    transition:width 0.3s;
}

#result{
    margin-top:40px;
    width:80%;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    padding:25px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>AJ-entic – Analyze WordPress plugin / Web Audit</h1>

<div class="upload-box">

<form id="uploadForm">

<label>Provider</label>
<select name="provider" id="provider">
<option value="local">Local (LM Studio / Oobabooga / Kobold)</option>
</select>

<label class="hidden">Model</label>
<input class="hidden" type="text" name="model" placeholder="ex: gpt-4o, claude-3-sonnet">

<div id="api_key_box">
<label>API Key</label>
<input type="text" name="api_key" placeholder="API key">
</div>

<div id="endpoint_box" class="hidden">
<label>Endpoint</label>
<input type="text" name="endpoint" placeholder="http://127.0.0.1:5000/v1/chat/completions">
</div>

<!-- ⭐ SELECTEUR D’AGENT ⭐ -->
<label>Agent IA</label>
<select name="agent" id="agent">
    <option value="default">Analyze wordpress Plugin (ZIP / folder)</option>
    <option value="web_audit">Audit Web (crawl URL)</option>
</select>

<!-- ⭐ Champ URL pour web_audit ⭐ -->
<div id="url_box" class="hidden">
    <label>URL du site à analyser</label>
    <input type="text" name="url" placeholder="https://exemple.com">
</div>

<!-- ⭐ Champ fichier pour les autres agents ⭐ -->
<div id="file_box">
    <label>WordPress Plugin (zip or folder)</label>
    <input type="file" name="file" id="fileInput" required>
</div>

<button type="submit">Analyser</button>

</form>

<div id="progress-container">
    <div id="progress-text">Progress...</div>
    <div id="progress-bar-bg">
        <div id="progress-bar"></div>
    </div>
</div>

<button id="downloadBtn" class="hidden">Download results</button>

</div>

<pre id="result" class="hidden"></pre>

<script>
console.log("UI loaded")

const provider = document.getElementById("provider")
const apiBox = document.getElementById("api_key_box")
const endpointBox = document.getElementById("endpoint_box")

function updateUI(){
    if(provider.value === "local"){
        apiBox.classList.add("hidden")
        endpointBox.classList.remove("hidden")
    } else {
        apiBox.classList.remove("hidden")
        endpointBox.classList.add("hidden")
    }
}
provider.addEventListener("change", updateUI)
updateUI()

const progressContainer = document.getElementById("progress-container")
const progressBar = document.getElementById("progress-bar")
const progressText = document.getElementById("progress-text")
const resultBox = document.getElementById("result")
const downloadBtn = document.getElementById("downloadBtn")

// ⭐ Gestion agent / URL / fichier ⭐
const agentSelect = document.getElementById("agent")
const urlBox = document.getElementById("url_box")
const fileBox = document.getElementById("file_box")
const fileInput = document.getElementById("fileInput")

function updateAgentUI(){
    if(agentSelect.value === "web_audit"){
        urlBox.classList.remove("hidden")
        fileBox.classList.add("hidden")
        fileInput.removeAttribute("required")
    } else {
        urlBox.classList.add("hidden")
        fileBox.classList.remove("hidden")
        fileInput.setAttribute("required", "true")
    }
}
agentSelect.addEventListener("change", updateAgentUI)
updateAgentUI()

// ⭐ Formulaire ⭐
document.getElementById("uploadForm").onsubmit = async function(e){
    e.preventDefault()

    let formData = new FormData()

    formData.append("provider", this.provider.value)
    formData.append("model", this.model.value)
    formData.append("api_key", this.api_key.value)
    formData.append("endpoint", this.endpoint.value)
    formData.append("agent", this.agent.value)

    if (this.agent.value === "web_audit") {
        formData.append("url", this.url.value)
    } else {
        formData.append("file", this.file.files[0])
    }

    progressContainer.style.display = "block"
    progressBar.style.width = "0%"
    progressText.innerText = "Préparation..."
    resultBox.textContent = ""
    downloadBtn.classList.add("hidden")

    const resp = await fetch("/upload", {
        method: "POST",
        body: formData
    })
    const data = await resp.json()

    if(data.status !== "started"){
        resultBox.textContent = "Erreur: " + JSON.stringify(data, null, 2)
        return
    }

    const evt = new EventSource("/progress")

    evt.onmessage = (e) => {
        const p = JSON.parse(e.data)

        const total = p.total || 1
        const percent = Math.floor((p.current / total) * 100)

        progressBar.style.width = percent + "%"
        progressText.innerText = `Analyse : ${p.current} / ${p.total} fichiers (${percent}%)`

        if (p.current >= p.total && p.total > 0 && p.zip_path){
            evt.close()
            progressText.innerText = "Analyse terminée."

            downloadBtn.classList.remove("hidden")
            downloadBtn.onclick = () => {
                window.location.href = "/download?zip_path=" + encodeURIComponent(p.zip_path)
            }

            resultBox.classList.remove("hidden")
            resultBox.textContent = "Analyse terminée. Téléchargez le ZIP pour voir les résultats."
        }
    }

    evt.onerror = (e) => {
        console.error("SSE error:", e)
    }
}



VANTA.NET({
  el: "body",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200,
  minWidth: 200,
  scale: 1,
  scaleMobile: 1,
  color: 0x64a5e0,
  backgroundColor: 0x0d0d0d
})
</script>

</body>
</html>
